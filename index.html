<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌺 Hawaii 2026 — Priyank &amp; Saloni</title>
  <style>
    :root {
      --ocean: #0077b6;
      --ocean-dark: #023e8a;
      --ocean-light: #caf0f8;
      --ocean-faint: #e8f4fd;
      --sand: #faf8f4;
      --coral: #e76f51;
      --green: #2d6a4f;
      --green-light: #d8f3dc;
      --yellow: #f59e0b;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --white: #fff;
      --radius: 14px;
      --shadow: 0 2px 10px rgba(0,0,0,0.07);
      --shadow-lg: 0 8px 28px rgba(0,0,0,0.13);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--sand); color: var(--text); line-height: 1.6; font-size: 15px; }

    /* ── Hero ── */
    .hero {
      position: relative;
      background: linear-gradient(150deg, #0077b6 0%, #023e8a 55%, #1b4332 100%);
      color: white;
      padding: 3.5rem 1.5rem 2.5rem;
      text-align: center;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1400&q=70&auto=format&fit=crop') center/cover no-repeat;
      opacity: 0.18;
    }
    .hero-content { position: relative; z-index: 1; }
    .hero-emoji { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .hero h1 { font-size: 2.1rem; font-weight: 800; letter-spacing: -1px; }
    .hero .sub { opacity: 0.88; margin-top: 0.3rem; font-size: 1rem; }
    .hero-pills { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin-top: 0.9rem; }
    .hero-pill {
      display: inline-flex; align-items: center; gap: 0.35rem;
      background: rgba(255,255,255,0.16);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.25);
      padding: 0.3rem 0.9rem;
      border-radius: 99px;
      font-size: 0.82rem;
      font-weight: 600;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      background: white;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
      overflow-x: auto; scrollbar-width: none;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex: none;
      padding: 0.8rem 1.1rem;
      font-size: 0.82rem; font-weight: 600;
      color: var(--muted); cursor: pointer;
      border: none; background: none;
      border-bottom: 2.5px solid transparent;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
      margin-bottom: -1px;
    }
    .tab.active { color: var(--ocean); border-bottom-color: var(--ocean); }
    .tab:hover:not(.active) { color: var(--text); }

    /* ── Layout ── */
    .content { max-width: 700px; margin: 0 auto; padding: 1.25rem 1rem 5rem; }
    .section { display: none; }
    .section.active { display: block; }

    /* ── Section titles ── */
    .sec-title {
      font-size: 0.75rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      color: var(--muted);
      margin: 1.75rem 0 0.7rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .sec-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .sec-title:first-child { margin-top: 0; }

    /* ── Info banner ── */
    .info-banner {
      background: var(--ocean-faint);
      border: 1px solid var(--ocean-light);
      border-radius: var(--radius);
      padding: 0.9rem 1.1rem;
      font-size: 0.84rem; color: #0c4a6e; line-height: 1.55;
      margin-bottom: 1.1rem;
    }
    .info-banner strong { display: block; margin-bottom: 0.2rem; font-size: 0.9rem; }

    /* ── Island banner ── */
    .island-banner {
      border-radius: var(--radius);
      padding: 1.1rem 1.25rem;
      margin-bottom: 1.25rem;
      color: white;
      font-size: 0.88rem; line-height: 1.5;
    }
    .island-banner.oahu { background: linear-gradient(135deg, #0077b6, #023e8a); }
    .island-banner.maui { background: linear-gradient(135deg, #2d6a4f, #1b4332); }
    .island-banner strong { display: block; font-size: 1rem; margin-bottom: 0.2rem; }

    /* ── Cards ── */
    .card {
      background: white;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      margin-bottom: 0.75rem;
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }

    .card-photo {
      height: 155px;
      background-color: var(--ocean-light);
      background-image: linear-gradient(135deg, #caf0f8 0%, #90e0ef 100%);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      position: relative;
    }
    .card-photo::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 48px;
      background: linear-gradient(transparent, rgba(0,0,0,0.22));
    }

    .card-inner { padding: 0.9rem 1.1rem 1rem; }
    .card-top { display: flex; align-items: flex-start; gap: 0.55rem; margin-bottom: 0.45rem; }

    .status-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .dot-pending  { background: #d1d5db; }
    .dot-confirmed { background: #22c55e; }
    .dot-watching  { background: #f59e0b; }
    .dot-ruled-out { background: #ef4444; }

    .card-title { font-weight: 700; font-size: 0.95rem; line-height: 1.3; flex: 1; }
    .card-body { font-size: 0.84rem; color: #4b5563; line-height: 1.55; }
    .card-link { display: inline-block; margin-top: 0.45rem; font-size: 0.8rem; color: var(--ocean); text-decoration: none; font-weight: 500; }
    .card-link:hover { text-decoration: underline; }

    /* ── Tags ── */
    .tags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.4rem; margin-bottom: 0.1rem; }
    .tag { display: inline-block; font-size: 0.69rem; font-weight: 600; padding: 0.15rem 0.5rem; border-radius: 99px; }
    .tag-res { background: #fff3cd; color: #856404; }
    .tag-free { background: var(--green-light); color: var(--green); }
    .tag-tip { background: #e0f2fe; color: #075985; }
    .tag-veg { background: #fef9c3; color: #713f12; }

    /* ── Urgent box ── */
    .urgent-box {
      background: #fff1f0;
      border: 1px solid #fca5a5;
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 0.75rem;
      box-shadow: var(--shadow);
    }
    .urgent-row {
      display: flex; justify-content: space-between; align-items: center;
      gap: 0.75rem; padding: 0.75rem 1rem;
      border-bottom: 1px solid #fee2e2;
    }
    .urgent-row:last-child { border-bottom: none; }
    .urgent-what { font-weight: 600; font-size: 0.88rem; }
    .urgent-note { font-size: 0.78rem; color: var(--muted); margin-top: 0.1rem; }
    .urgent-note a { color: var(--ocean); }
    .badge-asap { flex-shrink: 0; background: var(--coral); color: white; font-size: 0.68rem; font-weight: 700; padding: 0.22rem 0.6rem; border-radius: 99px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* ── Timed bookings ── */
    .booking-list { background: white; border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; margin-bottom: 0.75rem; box-shadow: var(--shadow); }
    .booking-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.75rem; padding: 0.8rem 1rem; border-bottom: 1px solid var(--border); }
    .booking-row:last-child { border-bottom: none; }
    .booking-what { font-weight: 600; font-size: 0.88rem; }
    .booking-detail { font-size: 0.78rem; color: var(--muted); margin-top: 0.1rem; }
    .booking-detail a { color: var(--ocean); }
    .badge-when { flex-shrink: 0; font-size: 0.7rem; font-weight: 700; padding: 0.22rem 0.65rem; border-radius: 99px; color: white; white-space: nowrap; text-align: center; }
    .badge-when.asap { background: var(--coral); }
    .badge-when.soon { background: var(--ocean); }

    /* ── Flights ── */
    .flight-list { background: white; border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow); margin-bottom: 0.75rem; }
    .flight-row { display: grid; grid-template-columns: 62px 1fr auto; gap: 0.5rem; align-items: center; padding: 0.72rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.84rem; }
    .flight-row:last-child { border-bottom: none; }
    .flight-row.alert { background: #fff7ed; }
    .flight-num { font-weight: 700; color: var(--ocean); font-size: 0.79rem; }
    .flight-row.alert .flight-num { color: var(--coral); }
    .flight-route { font-weight: 600; }
    .flight-time { font-size: 0.75rem; color: var(--muted); }
    .flight-note { font-size: 0.75rem; color: var(--coral); font-weight: 600; text-align: right; }

    /* ── Hotels ── */
    .hotel-card { background: white; border: 2px solid var(--ocean-light); border-radius: var(--radius); padding: 1.1rem 1.25rem; margin-bottom: 0.75rem; box-shadow: var(--shadow); }
    .hotel-card.star { border-color: #fbbf24; }
    .hotel-name { font-weight: 800; font-size: 1rem; }
    .hotel-meta { font-size: 0.82rem; color: var(--muted); margin: 0.2rem 0 0.7rem; }
    .hotel-perks { display: grid; gap: 0.25rem; font-size: 0.83rem; color: #374151; }

    /* ── Amex box ── */
    .amex-box { background: linear-gradient(135deg, #1e3a5f, #0e2040); color: white; border-radius: var(--radius); padding: 1rem 1.25rem; margin: 0.75rem 0; font-size: 0.84rem; line-height: 1.6; }
    .amex-box .amex-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; opacity: 0.6; margin-bottom: 0.35rem; }

    /* ── Itinerary ── */
    .day-card { background: white; border-radius: var(--radius); border: 1px solid var(--border); padding: 0.9rem 1.1rem; margin-bottom: 0.6rem; display: flex; gap: 0.9rem; box-shadow: var(--shadow); transition: transform 0.18s, box-shadow 0.18s; }
    .day-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-lg); }
    .day-num-box { flex-shrink: 0; text-align: center; width: 48px; }
    .day-num { font-size: 1.55rem; font-weight: 800; color: var(--ocean); line-height: 1; }
    .day-date { font-size: 0.66rem; color: var(--muted); margin-top: 0.1rem; }
    .day-island { font-size: 0.71rem; font-weight: 700; color: var(--coral); text-transform: uppercase; letter-spacing: 0.4px; }
    .day-title { font-weight: 700; font-size: 0.9rem; margin-top: 0.1rem; }
    .day-desc { font-size: 0.82rem; color: var(--muted); margin-top: 0.2rem; line-height: 1.5; }

    /* ── Tips ── */
    .tip-card { background: white; border-left: 4px solid var(--ocean); border-radius: 0 var(--radius) var(--radius) 0; padding: 0.85rem 1.1rem; margin-bottom: 0.6rem; box-shadow: var(--shadow); }
    .tip-card.coral { border-left-color: var(--coral); }
    .tip-card.green { border-left-color: var(--green); }
    .tip-head { display: flex; align-items: center; gap: 0.4rem; font-weight: 700; font-size: 0.9rem; margin-bottom: 0.3rem; }
    .tip-body { font-size: 0.84rem; color: #4b5563; line-height: 1.55; white-space: pre-line; }

    /* ── Footer ── */
    .footer { text-align: center; font-size: 0.75rem; color: var(--muted); padding: 2rem 1rem; }
  </style>
</head>
<body>

<div class="hero">
  <div class="hero-bg"></div>
  <div class="hero-content">
    <div class="hero-emoji">🌺</div>
    <h1 id="hero-title"></h1>
    <div class="sub" id="hero-sub"></div>
    <div class="hero-pills">
      <span class="hero-pill" id="hero-dates"></span>
      <span class="hero-pill" id="hero-oahu"></span>
      <span class="hero-pill" id="hero-maui"></span>
    </div>
  </div>
</div>

<div class="tabs" id="tabs"></div>

<div class="content">
  <div class="section active" id="tab-booking"></div>
  <div class="section" id="tab-oahu"></div>
  <div class="section" id="tab-maui"></div>
  <div class="section" id="tab-plan"></div>
  <div class="section" id="tab-logistics"></div>
  <div class="section" id="tab-tips"></div>
</div>

<div class="footer" id="footer"></div>

<script src="trip-data.js"></script>
<script>
// ── Helpers ──────────────────────────────────────────────────

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderTags(item) {
  if (!item.tags || !item.tags.length) return '';
  const html = item.tags.map(t => `<span class="tag tag-${esc(t.style)}">${esc(t.label)}</span>`).join('');
  return `<div class="tags">${html}</div>`;
}

function renderCard(item) {
  const dots = { pending: 'dot-pending', confirmed: 'dot-confirmed', watching: 'dot-watching', 'ruled-out': 'dot-ruled-out' };
  const dot = dots[item.status] || 'dot-pending';
  const photoHtml = item.photo
    ? `<div class="card-photo" style="background-image:url('${esc(item.photo)}')"></div>`
    : '';
  const linkHtml = item.url
    ? `<a class="card-link" href="${esc(item.url)}" target="_blank" rel="noopener">${esc(item.urlLabel || item.url)}</a>`
    : '';
  return `
    <div class="card">
      ${photoHtml}
      <div class="card-inner">
        <div class="card-top">
          <div class="status-dot ${dot}"></div>
          <div class="card-title">${esc(item.title)}</div>
        </div>
        ${renderTags(item)}
        <div class="card-body">${esc(item.body)}</div>
        ${linkHtml}
      </div>
    </div>`;
}

function renderIsland(island) {
  return island.sections.map(sec => `
    <div class="sec-title">${sec.icon} ${sec.title}</div>
    ${sec.items.map(renderCard).join('')}
  `).join('');
}

// ── Tab renderers ────────────────────────────────────────────

function renderBookings() {
  const d = TRIP_DATA.bookings;
  document.getElementById('tab-booking').innerHTML = `
    <div class="info-banner">
      <strong>💡 Timezone note</strong>
      ${TRIP_DATA.timezone}
    </div>
    <div class="sec-title">🚨 Act Now</div>
    <div class="urgent-box">
      ${d.urgent.map(u => `
        <div class="urgent-row">
          <div>
            <div class="urgent-what">${esc(u.what)}</div>
            <div class="urgent-note"><a href="${esc(u.url)}" target="_blank" rel="noopener">${esc(u.urlLabel)}</a> · ${esc(u.note)}</div>
          </div>
          <div class="badge-asap">ASAP</div>
        </div>`).join('')}
    </div>
    <div class="sec-title">📅 Timed Windows</div>
    <div class="booking-list">
      ${d.timed.map(b => `
        <div class="booking-row">
          <div>
            <div class="booking-what">${esc(b.what)}</div>
            <div class="booking-detail"><a href="${esc(b.url)}" target="_blank" rel="noopener">${esc(b.urlLabel)}</a> — ${esc(b.detail)}</div>
          </div>
          <div class="badge-when ${esc(b.urgency)}">${esc(b.when)}</div>
        </div>`).join('')}
    </div>`;
}

function renderOahu() {
  document.getElementById('tab-oahu').innerHTML =
    `<div class="island-banner oahu"><strong>🌺 O'ahu · Aug 27–31</strong>${TRIP_DATA.oahu.info}</div>` +
    renderIsland(TRIP_DATA.oahu);
}

function renderMaui() {
  document.getElementById('tab-maui').innerHTML =
    `<div class="island-banner maui"><strong>🌋 Maui · Aug 31–Sep 4</strong>${TRIP_DATA.maui.info}</div>` +
    renderIsland(TRIP_DATA.maui);
}

function renderPlan() {
  const days = TRIP_DATA.itinerary;
  document.getElementById('tab-plan').innerHTML =
    `<div class="info-banner">Loose skeleton — adjust after bookings are confirmed. Don't over-schedule Maui; the island rewards slow mornings.</div>` +
    days.map(d => `
      <div class="day-card">
        <div class="day-num-box">
          <div class="day-num">${esc(d.day)}</div>
          <div class="day-date">${esc(d.date)}<br>${esc(d.dow)}</div>
        </div>
        <div>
          <div class="day-island">${d.island}</div>
          <div class="day-title">${esc(d.title)}</div>
          <div class="day-desc">${esc(d.desc)}</div>
        </div>
      </div>`).join('');
}

function renderLogistics() {
  const d = TRIP_DATA.logistics;
  document.getElementById('tab-logistics').innerHTML = `
    <div class="sec-title">✈️ Flights — Alaska Airlines</div>
    <div class="flight-list">
      ${d.flights.map(f => `
        <div class="flight-row ${f.alert ? 'alert' : ''}">
          <div class="flight-num">${esc(f.num)}</div>
          <div>
            <div class="flight-route">${esc(f.route)}</div>
            <div class="flight-time">${esc(f.time)}</div>
          </div>
          <div class="flight-note">${esc(f.note)}</div>
        </div>`).join('')}
    </div>

    <div class="sec-title">🏨 Hotels — Amex Fine Hotels & Resorts</div>
    ${d.hotels.map(h => `
      <div class="hotel-card ${h.star ? 'star' : ''}">
        <div class="hotel-name">${esc(h.name)}</div>
        <div class="hotel-meta">${esc(h.island)} · ${esc(h.dates)} · ${esc(h.nightly)}/night</div>
        <div class="hotel-perks">${h.perks.map(p => `<div>${esc(p)}</div>`).join('')}</div>
      </div>`).join('')}
    <div class="amex-box">
      <div class="amex-label">💳 Amex Credit Strategy</div>
      ${d.amexTip}
    </div>

    <div class="sec-title">🚗 Rental Car — Maui</div>
    <div class="card">
      <div class="card-inner">
        <div class="card-body">${d.car}</div>
      </div>
    </div>`;
}

function renderTips() {
  const tips = TRIP_DATA.tips;
  const sections = [...new Set(tips.map(t => t.section))];
  document.getElementById('tab-tips').innerHTML = sections.map(sec => `
    <div class="sec-title">— ${esc(sec)}</div>
    ${tips.filter(t => t.section === sec).map(t => `
      <div class="tip-card ${esc(t.color)}">
        <div class="tip-head">${t.icon} ${esc(t.title)}</div>
        <div class="tip-body">${esc(t.body)}</div>
      </div>`).join('')}
  `).join('');
}

// ── Tab switching ─────────────────────────────────────────────

function showTab(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  btn.classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Init ──────────────────────────────────────────────────────

(function init() {
  const m = TRIP_DATA.meta;
  document.title = '🌺 ' + m.title + ' — ' + m.travelers;
  document.getElementById('hero-title').textContent = m.title;
  document.getElementById('hero-sub').textContent = m.travelers;
  document.getElementById('hero-dates').textContent = '📅 ' + m.dates;
  document.getElementById('hero-oahu').textContent = '🌺 ' + m.oahu;
  document.getElementById('hero-maui').textContent = '🌋 ' + m.maui;

  const tabs = [
    { id: 'booking',   label: '⏰ Bookings' },
    { id: 'oahu',      label: "🌺 O'ahu"    },
    { id: 'maui',      label: '🌋 Maui'     },
    { id: 'plan',      label: '🗓 Plan'     },
    { id: 'logistics', label: '✈️ Logistics' },
    { id: 'tips',      label: '💡 Tips'     }
  ];
  document.getElementById('tabs').innerHTML = tabs.map((t, i) =>
    `<button class="tab ${i === 0 ? 'active' : ''}" onclick="showTab('${t.id}', this)">${t.label}</button>`
  ).join('');

  renderBookings();
  renderOahu();
  renderMaui();
  renderPlan();
  renderLogistics();
  renderTips();

  document.getElementById('footer').innerHTML =
    `Last updated: ${m.lastUpdated} &middot; Built with Claude for ${m.travelers} 🌺`;
})();
</script>
</body>
</html>
